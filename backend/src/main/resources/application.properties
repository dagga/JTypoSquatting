server.port=8080
server.servlet.context-path=/
spring.application.name=jtyposquatting-api

# Virtual Threads (Java 21+) - Enabled for better I/O concurrency
spring.threads.virtual.enabled=true
spring.task.execution.pool.core-size=16
spring.task.execution.pool.max-size=128

# Jetty embedded server configuration
server.jetty.threads.max=200
server.jetty.threads.min=8

# SSE Configuration
spring.mvc.async.request-timeout=300000

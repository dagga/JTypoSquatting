# JTypoSquatting API Configuration
# Default configuration for development

# ===== Server Configuration =====
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-stacktrace=never

# ===== Application Configuration =====
spring.application.name=jtyposquatting-api
spring.application.description=JTypoSquatting REST API for domain typo squatting analysis

# ===== Logging Configuration =====
logging.level.root=INFO
logging.level.com.aleph.graymatter.jtyposquatting=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===== HTTP Encoding =====
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===== Jackson (JSON) Configuration =====
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent-output=true

# ===== Actuator Configuration (Monitoring) =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true

# ===== Performance =====
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.connection-timeout=20000
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

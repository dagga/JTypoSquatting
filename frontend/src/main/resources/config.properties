# JTypoSquatting Application Configuration
# Version: 2.0-alpha1

# API Configuration
api.default.url=http://localhost:8080
api.timeout.ms=10000
api.health.check.enabled=true

# Domain Testing Configuration
domain.testing.timeout.ms=5000
domain.batch.size=50
domain.batch.delay.ms=200
domain.max.parallel.checks=10

# UI Configuration
ui.window.width=1200
ui.window.height=800
ui.table.row.height=24
ui.preview.width=320
ui.preview.height=240
ui.max.open.dialogs=5
ui.icon.size=20
ui.flag.icon.size=24

# Logging Configuration
log.backend.path=/tmp/jtypo-backend.log
log.frontend.path=/tmp/jtypo-frontend.log
log.tail.enabled=true

# Screenshot Configuration
screenshot.enabled=true
screenshot.width=320
screenshot.height=240
screenshot.scale.smooth=true
screenshot.wait.timeout.ms=5000

# Network Configuration
network.user.agent=Mozilla/5.0 (compatible; JTypoSquatting/2.0-alpha1)
network.connection.timeout.ms=10000
network.read.timeout.ms=30000

# Cache Configuration
cache.enabled=true
cache.max.size=1000
cache.ttl.seconds=3600

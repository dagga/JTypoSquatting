# GitHub Actions Workflow for JTypoSquatting
# Builds and publishes the executable JAR on releases

name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew clean build --no-daemon
      
    - name: Build optimized fat JAR
      run: ./gradlew :frontend:fatJar --no-daemon
      
    - name: Get version from gradle.properties
      id: version
      run: |
        VERSION=$(grep "^version=" gradle.properties 2>/dev/null | cut -d'=' -f2 || echo "2.0-alpha1")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Using version: $VERSION"
      
    - name: Copy JAR to artifacts directory
      run: |
        mkdir -p artifacts
        cp frontend/build/libs/JTypoSquatting.jar artifacts/JTypoSquatting-${{ steps.version.outputs.version }}.jar
        cp frontend/build/libs/JTypoSquatting.jar artifacts/JTypoSquatting.jar
        
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: JTypoSquatting-JAR
        path: artifacts/*.jar
        retention-days: 30
        
    - name: Create GitHub Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/JTypoSquatting-${{ steps.version.outputs.version }}.jar
          artifacts/JTypoSquatting.jar
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Run tests
      run: ./gradlew test --no-daemon
      
  analyze-jar-size:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: JTypoSquatting-JAR
        path: ./artifacts
        
    - name: Analyze JAR size
      run: |
        echo "=== JAR File Size ==="
        ls -lh artifacts/*.jar
        echo ""
        echo "=== JAR Contents Summary ==="
        for jar in artifacts/*.jar; do
          echo "File: $jar"
          echo "Size: $(du -h $jar | cut -f1)"
          echo "Entries: $(unzip -l $jar | wc -l)"
          echo ""
          echo "Top 10 largest entries:"
          unzip -l $jar | sort -k1 -nr | head -10 | awk '{printf "%.2f MB\t%s\n", $1/1024/1024, $4}'
        done
        
    - name: Upload size report
      uses: actions/upload-artifact@v4
      with:
        name: jar-size-report
        path: artifacts/
        retention-days: 7

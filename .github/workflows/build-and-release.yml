# GitHub Actions Workflow for JTypoSquatting
# Builds and publishes the executable JAR on releases
#
# Note: JavaFX screenshot capture requires a display. In headless CI environments,
# Xvfb (X Virtual Framebuffer) is used to provide a virtual display.

name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Install Xvfb for headless JavaFX testing
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgtk-3-0 libxrender1 libxtst6 libxi6

    - name: Set up virtual display for JavaFX
      run: |
        # Start Xvfb on display :99
        Xvfb :99 -screen 0 1280x1024x24 &
        export DISPLAY=:99
        echo "DISPLAY=:99" >> $GITHUB_ENV
        echo "JavaFX configured with DISPLAY=:99"
        sleep 2  # Wait for Xvfb to start

    - name: Verify Xvfb is running
      run: |
        ps aux | grep Xvfb
        echo "DISPLAY is: $DISPLAY"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests with Xvfb
      run: |
        # Run tests with virtual display
        export DISPLAY=:99
        echo "Running tests with DISPLAY=$DISPLAY"
        ./gradlew test --no-daemon --info --stacktrace

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          **/build/reports/tests/
          **/build/test-results/
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Install Xvfb for headless JavaFX build
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgtk-3-0 libxrender1 libxtst6 libxi6

    - name: Set up virtual display for JavaFX
      run: |
        Xvfb :99 -screen 0 1280x1024x24 &
        export DISPLAY=:99
        echo "DISPLAY=:99" >> $GITHUB_ENV
        echo "JavaFX configured with DISPLAY=:99"
        sleep 2

    - name: Verify Xvfb is running
      run: |
        ps aux | grep Xvfb
        echo "DISPLAY is: $DISPLAY"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: DISPLAY=:99 ./gradlew clean build --no-daemon

    - name: Build optimized fat JAR
      run: DISPLAY=:99 ./gradlew :frontend:fatJar --no-daemon

    - name: Get version from gradle.properties
      id: version
      run: |
        VERSION=$(grep "^version=" gradle.properties 2>/dev/null | cut -d'=' -f2 || echo "2.0-alpha1")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Using version: $VERSION"

    - name: Copy JAR to artifacts directory
      run: |
        mkdir -p artifacts
        cp frontend/build/libs/JTypoSquatting.jar artifacts/JTypoSquatting-${{ steps.version.outputs.version }}.jar
        cp frontend/build/libs/JTypoSquatting.jar artifacts/JTypoSquatting.jar

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: JTypoSquatting-JAR
        path: artifacts/*.jar
        retention-days: 30

    - name: Create GitHub Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/JTypoSquatting-${{ steps.version.outputs.version }}.jar
          artifacts/JTypoSquatting.jar
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  analyze-jar-size:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: JTypoSquatting-JAR
        path: ./artifacts

    - name: Analyze JAR size
      run: |
        echo "=== JAR File Size ==="
        ls -lh artifacts/*.jar
        echo ""
        echo "=== JAR Contents Summary ==="
        for jar in artifacts/*.jar; do
          echo "File: $jar"
          echo "Size: $(du -h $jar | cut -f1)"
          echo "Entries: $(unzip -l $jar | wc -l)"
          echo ""
          echo "Top 10 largest entries:"
          unzip -l $jar | sort -k1 -nr | head -10 | awk '{printf "%.2f MB\t%s\n", $1/1024/1024, $4}'
        done

    - name: Upload size report
      uses: actions/upload-artifact@v4
      with:
        name: jar-size-report
        path: artifacts/
        retention-days: 7
